<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockIQ — JarNox Internship Assignment</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header { background: #1a1d27; padding: 16px 28px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #2a2d3e; }
    header h1 { font-size: 1.4rem; color: #7c6af7; font-weight: 700; }
    header span { font-size: 0.85rem; color: #888; }

    /* ── Layout ── */
    .container { display: flex; flex: 1; }

    /* ── Sidebar ── */
    aside { width: 240px; background: #13151f; border-right: 1px solid #2a2d3e; padding: 16px 0; overflow-y: auto; }
    aside h2 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 10px; }
    .company-item { padding: 11px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
    .company-item:hover { background: #1e2130; }
    .company-item.active { background: #1e2130; border-left-color: #7c6af7; }
    .company-item .symbol { font-weight: 700; font-size: 0.88rem; color: #c9b8ff; }
    .company-item .name { font-size: 0.75rem; color: #777; margin-top: 2px; }

    /* ── Main ── */
    main { flex: 1; padding: 24px; overflow-y: auto; }

    /* ── Stat Cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: #1a1d27; border-radius: 10px; padding: 16px; border: 1px solid #2a2d3e; }
    .stat-card .label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; margin-top: 6px; color: #e0e0e0; }
    .stat-card .value.green { color: #4cde8c; }
    .stat-card .value.red { color: #f06868; }

    /* ── Chart Area ── */
    .chart-card { background: #1a1d27; border-radius: 10px; padding: 20px; border: 1px solid #2a2d3e; margin-bottom: 20px; }
    .chart-card h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .chart-card h3 strong { color: #e0e0e0; }
    canvas { width: 100% !important; }

    /* ── Filter Bar ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #3a3d50; background: #1a1d27; color: #aaa; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: #7c6af7; border-color: #7c6af7; color: #fff; }
    select { padding: 6px 12px; border-radius: 6px; border: 1px solid #3a3d50; background: #1a1d27; color: #aaa; font-size: 0.82rem; cursor: pointer; }

    /* ── Compare ── */
    .compare-section { background: #1a1d27; border-radius: 10px; padding: 20px; border: 1px solid #2a2d3e; }
    .compare-section h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 14px; }
    .compare-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .compare-controls select { min-width: 180px; }
    .btn { padding: 7px 18px; border-radius: 6px; border: none; background: #7c6af7; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .btn:hover { background: #6a59e0; }
    .compare-result { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    .compare-box { background: #13151f; border-radius: 8px; padding: 14px; border: 1px solid #2a2d3e; }
    .compare-box .sym { font-weight: 700; color: #c9b8ff; font-size: 0.9rem; }
    .compare-box .row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 6px; color: #aaa; }
    .compare-box .row span:last-child { color: #e0e0e0; font-weight: 600; }
    .corr-badge { text-align: center; padding: 10px; background: #13151f; border-radius: 8px; border: 1px solid #2a2d3e; font-size: 0.85rem; margin-top: 10px; }

    .loading { text-align: center; color: #666; padding: 40px; }
    .gainers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .gainer-card { background: #1a1d27; border-radius: 10px; padding: 16px; border: 1px solid #2a2d3e; }
    .gainer-card h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .gainer-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 5px 0; border-bottom: 1px solid #2a2d3e; }
    .gainer-row:last-child { border-bottom: none; }
    .gainer-row .pct.green { color: #4cde8c; font-weight: 700; }
    .gainer-row .pct.red { color: #f06868; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <h1>📈 StockIQ</h1>
  <span>JarNox Internship Assignment — Stock Data Intelligence Dashboard</span>
</header>

<div class="container">
  <aside>
    <h2>Companies</h2>
    <div id="company-list"><div class="loading">Loading...</div></div>
  </aside>

  <main id="main-content">
    <div class="loading">← Select a company to view data</div>
  </main>
</div>

<script>
const API = "";  // same origin
let allCompanies = [];
let currentSymbol = null;
let priceChart = null;
let returnChart = null;

// ── Load company list ──
async function loadCompanies() {
  const res = await fetch(`${API}/companies`);
  allCompanies = await res.json();
  const list = document.getElementById("company-list");
  list.innerHTML = allCompanies.map(c => `
    <div class="company-item" onclick="selectCompany('${c.symbol}')" id="item-${c.symbol.replace('.','_')}">
      <div class="symbol">${c.symbol}</div>
      <div class="name">${c.name}</div>
    </div>
  `).join("");

  // Load gainers/losers on start
  loadGainersLosers();
}

// ── Select company ──
async function selectCompany(symbol, days = 30) {
  currentSymbol = symbol;

  // Highlight sidebar
  document.querySelectorAll(".company-item").forEach(el => el.classList.remove("active"));
  const id = `item-${symbol.replace('.','_')}`;
  document.getElementById(id)?.classList.add("active");

  const main = document.getElementById("main-content");
  main.innerHTML = `<div class="loading">Loading data for ${symbol}...</div>`;

  const [dataRes, summaryRes] = await Promise.all([
    fetch(`${API}/data/${symbol}?days=${days}`),
    fetch(`${API}/summary/${symbol}`)
  ]);
  const data = await dataRes.json();
  const summary = await summaryRes.json();

  const latest = data.data[data.data.length - 1];
  const first = data.data[0];
  const pctChange = (((latest.close - first.close) / first.close) * 100).toFixed(2);
  const isUp = pctChange >= 0;

  main.innerHTML = `
    <!-- Filter Bar -->
    <div class="filter-bar">
      <strong style="color:#888;font-size:0.85rem;">${data.company} (${symbol})</strong>
      ${[7,30,90,180,365].map(d => `
        <button class="filter-btn ${d == days ? 'active' : ''}" onclick="selectCompany('${symbol}', ${d})">${d}D</button>
      `).join("")}
    </div>

    <!-- Stat Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Latest Close</div>
        <div class="value">₹${latest.close?.toFixed(2) ?? 'N/A'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Period Change</div>
        <div class="value ${isUp ? 'green' : 'red'}">${isUp ? '+' : ''}${pctChange}%</div>
      </div>
      <div class="stat-card">
        <div class="label">52W High</div>
        <div class="value green">₹${summary['52_week_high']?.toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="label">52W Low</div>
        <div class="value red">₹${summary['52_week_low']?.toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Close (52W)</div>
        <div class="value">₹${summary.avg_close}</div>
      </div>
      <div class="stat-card">
        <div class="label">Volatility Score</div>
        <div class="value">${summary.volatility_score ? (summary.volatility_score * 100).toFixed(2) + '%' : 'N/A'}</div>
      </div>
    </div>

    <!-- Price + MA Chart -->
    <div class="chart-card">
      <h3>📊 <strong>Closing Price</strong> with 7-Day Moving Average</h3>
      <canvas id="priceChart" height="100"></canvas>
    </div>

    <!-- Daily Return Chart -->
    <div class="chart-card">
      <h3>📉 <strong>Daily Return %</strong></h3>
      <canvas id="returnChart" height="70"></canvas>
    </div>

    <!-- Compare Section -->
    <div class="compare-section">
      <h3>⚖️ Compare with another stock</h3>
      <div class="compare-controls">
        <select id="compare-select">
          ${allCompanies.filter(c => c.symbol !== symbol).map(c =>
            `<option value="${c.symbol}">${c.symbol} — ${c.name}</option>`
          ).join("")}
        </select>
        <button class="btn" onclick="runCompare('${symbol}', ${days})">Compare</button>
      </div>
      <div id="compare-result"></div>
    </div>
  `;

  drawPriceChart(data.data);
  drawReturnChart(data.data);
}

// ── Price Chart ──
function drawPriceChart(data) {
  const labels = data.map(d => d.date);
  const closes = data.map(d => d.close);
  const ma7 = data.map(d => d.ma_7);

  if (priceChart) priceChart.destroy();
  priceChart = new Chart(document.getElementById("priceChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Close Price",
          data: closes,
          borderColor: "#7c6af7",
          backgroundColor: "rgba(124,106,247,0.08)",
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        },
        {
          label: "7D MA",
          data: ma7,
          borderColor: "#f0a868",
          borderDash: [5,4],
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#aaa", font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: "#666", maxTicksLimit: 10 }, grid: { color: "#1e2130" } },
        y: { ticks: { color: "#888" }, grid: { color: "#1e2130" } }
      }
    }
  });
}

// ── Daily Return Chart ──
function drawReturnChart(data) {
  const labels = data.map(d => d.date);
  const returns = data.map(d => d.daily_return ? (d.daily_return * 100) : 0);
  const colors = returns.map(r => r >= 0 ? "rgba(76,222,140,0.7)" : "rgba(240,104,104,0.7)");

  if (returnChart) returnChart.destroy();
  returnChart = new Chart(document.getElementById("returnChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Daily Return %",
        data: returns,
        backgroundColor: colors,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#aaa", font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: "#666", maxTicksLimit: 10 }, grid: { color: "#1e2130" } },
        y: { ticks: { color: "#888", callback: v => v.toFixed(1) + "%" }, grid: { color: "#1e2130" } }
      }
    }
  });
}

// ── Compare ──
async function runCompare(symbol1, days) {
  const symbol2 = document.getElementById("compare-select").value;
  const res = await fetch(`${API}/compare?symbol1=${symbol1}&symbol2=${symbol2}&days=${days}`);
  const d = await res.json();

  const box = (sym) => {
    const s = d[sym];
    const isUp = s.pct_change >= 0;
    return `
      <div class="compare-box">
        <div class="sym">${sym}</div>
        <div style="font-size:0.75rem;color:#666;margin-bottom:8px">${s.company}</div>
        <div class="row"><span>Start Price</span><span>₹${s.start_price?.toFixed(2)}</span></div>
        <div class="row"><span>End Price</span><span>₹${s.end_price?.toFixed(2)}</span></div>
        <div class="row"><span>Period Change</span><span style="color:${isUp ? '#4cde8c' : '#f06868'}">${isUp ? '+' : ''}${s.pct_change}%</span></div>
        <div class="row"><span>52W High</span><span>₹${s['52_week_high']?.toFixed(2)}</span></div>
        <div class="row"><span>Avg Daily Return</span><span>${s.avg_daily_return ? (s.avg_daily_return*100).toFixed(3) + '%' : 'N/A'}</span></div>
      </div>`;
  };

  document.getElementById("compare-result").innerHTML = `
    <div class="compare-result">
      ${box(symbol1)}
      ${box(symbol2)}
    </div>
    <div class="corr-badge">
      Correlation: <strong>${d.correlation}</strong> — ${d.correlation_note}
    </div>`;
}

// ── Gainers / Losers ──
async function loadGainersLosers() {
  const main = document.getElementById("main-content");
  const res = await fetch(`${API}/gainers-losers`);
  const d = await res.json();

  const row = (r) => `
    <div class="gainer-row">
      <span>${r.symbol.replace('.NS','')}<br><small style="color:#666">${r.company}</small></span>
      <span class="pct ${r.daily_return_pct >= 0 ? 'green' : 'red'}">${r.daily_return_pct >= 0 ? '+' : ''}${r.daily_return_pct}%</span>
    </div>`;

  main.innerHTML = `
    <div style="margin-bottom:16px">
      <h2 style="font-size:1rem;color:#c9b8ff;margin-bottom:4px">Welcome to StockIQ 📈</h2>
      <p style="font-size:0.82rem;color:#666">Select a company from the left to explore its data.</p>
    </div>
    <div class="gainers-grid">
      <div class="gainer-card">
        <h3>🟢 Top Gainers</h3>
        ${d.top_gainers.map(row).join("")}
      </div>
      <div class="gainer-card">
        <h3>🔴 Top Losers</h3>
        ${d.top_losers.map(row).join("")}
      </div>
    </div>
    <p style="font-size:0.75rem;color:#555;text-align:center">Data sourced via yfinance • Stored in SQLite • Served by FastAPI</p>
  `;
}

// Init
loadCompanies();
</script>
</body>
</html>
